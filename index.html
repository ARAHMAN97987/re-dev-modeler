<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZAN Financial Modeler</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    @media (max-width: 768px) {
      body { overflow-x: hidden; }
      /* 3-col grids → 2-col on mobile */
      div[style*="1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
      /* Smaller table font */
      table { font-size: 10px !important; }
      th, td { padding: 6px 4px !important; }
      /* Recharts container */
      .recharts-responsive-container { min-width: 0 !important; }
      /* Modal max-width */
      div[style*="width: 800px"], div[style*="width:800px"] { width: 95vw !important; max-width: 95vw !important; }
      /* Touch-friendly inputs (prevent iOS zoom) */
      input, select, textarea { font-size: 16px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
